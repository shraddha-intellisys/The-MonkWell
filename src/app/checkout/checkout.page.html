<div class="checkout-page">
  <app-header></app-header>

  <section class="checkout-section">
    <div class="container">
      <h1>Checkout</h1>

      <div class="checkout-grid">
        <!-- Left -->
        <div class="checkout-form">
          <h2>Shipping Details</h2>

          <div class="form-group">
            <label>Full Name</label>
            <input type="text" [(ngModel)]="checkoutData.fullName" />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="checkoutData.email" />
          </div>

          <div class="form-group">
            <label>Phone</label>
            <input type="text" [(ngModel)]="checkoutData.phone" />
          </div>

          <div class="form-group">
            <label>Address</label>
            <textarea rows="4" [(ngModel)]="checkoutData.address"></textarea>
          </div>

          <div class="form-group">
            <label>City</label>
            <input type="text" [(ngModel)]="checkoutData.city" />
          </div>

          <div class="form-group">
            <label>State</label>
            <input type="text" [(ngModel)]="checkoutData.state" />
          </div>

          <div class="form-group">
            <label>Pincode</label>
            <input type="text" [(ngModel)]="checkoutData.pincode" />
          </div>

          <div class="form-group">
            <label>Payment Method</label>
            <select [(ngModel)]="checkoutData.paymentMethod">
              <option value="cod">Cash on Delivery</option>
              <option value="upi">UPI</option>
              <option value="card">Card</option>
              <option value="netbanking">Net Banking</option>
            </select>
          </div>
        </div>

        <!-- Right -->
        <div class="order-summary">
          <h2>Order Summary</h2>

          <div class="summary-item" *ngFor="let item of cartItems">
            <div>
              <h4>{{ item.name }}</h4>
              <p>Qty: {{ item.quantity }}</p>
            </div>
            <span>₹{{ item.price * item.quantity }}</span>
          </div>

          <div class="summary-row">
            <span>Subtotal</span>
            <span>₹{{ subtotal }}</span>
          </div>

          <div class="summary-row">
            <span>Delivery</span>
            <span>₹{{ deliveryCharge }}</span>
          </div>

          <div class="summary-row total-row">
            <span>Total</span>
            <span>₹{{ total }}</span>
          </div>

          <button class="primary-btn" (click)="placeOrder()">
            Place Order
          </button>
        </div>
      </div>
    </div>
  </section>
  <!-- Success Popup -->
<div class="success-popup-overlay" *ngIf="showSuccessPopup">
  <div class="success-popup">
    <div class="success-icon">✓</div>
    <h2>Order Placed Successfully</h2>
    <p>Your order has been placed successfully and will be processed soon.</p>
  </div>
</div>
</div>
