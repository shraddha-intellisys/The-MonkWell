<div class="login-page">
  <div class="login-card">
    <h1>Login</h1>
    <p>Welcome to MonkWell</p>

    <div class="form-group">
      <label>Name</label>
      <input type="text" [(ngModel)]="user.name" placeholder="Enter your name" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="user.email" placeholder="Enter your email" />
    </div>

    <button class="primary-btn" (click)="login()">Login</button>
  </div>
</div>
