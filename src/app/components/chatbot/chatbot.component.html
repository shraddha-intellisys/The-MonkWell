<div class="chatbot-wrapper">

  <div class="chat-window" *ngIf="isOpen">
    <div class="chat-header">
      <h3>The MonkWell Assistant</h3>
      <p>Ask about products, support, and orders</p>
    </div>

    <div class="quick-actions">
      <button type="button" (click)="sendQuickMessage('Order now')">Order Now</button>
      <button type="button" (click)="sendQuickMessage('Track order')">Track Order</button>
      <button type="button" (click)="sendQuickMessage('Help')">Help</button>
      <button type="button" (click)="sendQuickMessage('FAQ')">FAQ</button>
    </div>

    <div class="chat-body">
      <div
        *ngFor="let msg of messages"
        class="chat-message"
        [ngClass]="msg.sender"
      >
        {{ msg.text }}
      </div>
    </div>

    <div class="chat-footer">
      <input
        type="text"
        [(ngModel)]="userMessage"
        placeholder="Type your message..."
        (keyup.enter)="sendMessage()"
      />
      <button type="button" (click)="sendMessage()">Send</button>
    </div>
  </div>

  <!-- WhatsApp -->
  <a
    class="floating-btn whatsapp-btn"
    [href]="whatsappLink"
    target="_blank"
    aria-label="Chat on WhatsApp"
  >
    <svg
      viewBox="0 0 24 24"
      fill="none"
      class="floating-icon"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M16.75 13.96c.25.13 1.47.72 1.7.85.23.12.38.19.44.31.06.12.06.69-.19 1.36-.25.67-1.44 1.31-1.96 1.39-.5.08-1.13.12-1.82-.1-.42-.13-.96-.31-1.66-.61-2.91-1.26-4.8-4.2-4.95-4.4-.15-.2-1.18-1.57-1.18-2.99 0-1.42.74-2.11 1-2.4.25-.29.56-.36.75-.36.19 0 .38 0 .54.01.17.01.4-.06.62.47.23.56.77 1.93.84 2.07.06.14.1.31.02.5-.08.19-.12.31-.25.48-.12.17-.27.38-.38.5-.13.15-.27.31-.12.61.15.29.67 1.11 1.44 1.8.98.87 1.8 1.14 2.1 1.27.29.12.46.1.63-.06.17-.17.73-.85.92-1.14.19-.29.38-.25.63-.15Z"
        fill="currentColor"
      />
      <path
        d="M20 12c0 4.42-3.58 8-8 8-1.4 0-2.72-.36-3.86-.99L4 20l1.06-4.03A7.96 7.96 0 0 1 4 12c0-4.42 3.58-8 8-8s8 3.58 8 8Z"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </a>

  <!-- Chatbot -->
  <button
    class="floating-btn chat-toggle-btn"
    (click)="toggleChat()"
    aria-label="Open chatbot"
    type="button"
  >
    <svg
      *ngIf="!isOpen"
      viewBox="0 0 24 24"
      fill="none"
      class="floating-icon"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M21 11.5C21 16.19 16.97 20 12 20c-1.2 0-2.35-.22-3.39-.62L4 20l1.02-3.72C3.77 14.98 3 13.32 3 11.5 3 6.81 7.03 3 12 3s9 3.81 9 8.5Z"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>

    <svg
      *ngIf="isOpen"
      viewBox="0 0 24 24"
      fill="none"
      class="floating-icon"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M18 6L6 18"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      />
      <path
        d="M6 6L18 18"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      />
    </svg>
  </button>
</div>
