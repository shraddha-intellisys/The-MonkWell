<header class="header">
  <div class="container header-inner">
    <div class="logo">The MonkWell.</div>

    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/products" routerLinkActive="active">Products</a>
      <a routerLink="/why-us" routerLinkActive="active">Why Us</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
    </nav>

    <div class="header-actions">
      <button class="primary-btn" type="button" (click)="goToCart()">🛒 Cart</button>
      <button class="primary-btn" type="button" (click)="goToProfile()">👤 Profile</button>
    </div>
  </div>
</header>
