<div class="cart-page">
  <app-header></app-header>

  <section class="cart-section">
    <div class="container">
      <h1>Your Cart</h1>

      <div *ngIf="cartItems.length === 0" class="empty-cart">
        <p>Your cart is empty.</p>
        <a routerLink="/products" class="primary-btn">Continue Shopping</a>
      </div>

      <div *ngIf="cartItems.length > 0" class="cart-content">
        <div class="cart-item" *ngFor="let item of cartItems">
          <div class="cart-item-image">
            <img [src]="item.image" [alt]="item.name" />
          </div>

          <div class="cart-item-details">
            <h3>{{ item.name }}</h3>
            <p>{{ item.description }}</p>
            <span class="price">₹{{ item.price }}</span>
          </div>

          <div class="cart-item-actions">
            <div class="quantity-controls">
              <button (click)="decreaseQuantity(item.name)">-</button>
              <span>{{ item.quantity }}</span>
              <button (click)="increaseQuantity(item.name)">+</button>
            </div>

            <button class="remove-btn" (click)="removeItem(item.name)">
              Remove
            </button>
          </div>
        </div>

        <div class="cart-summary">
          <h2>Total: ₹{{ totalPrice }}</h2>

          <div class="summary-buttons">
            <a routerLink="/checkout" class="primary-btn">Proceed to Checkout</a>
            <button class="secondary-btn" (click)="clearCart()">Clear Cart</button>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
